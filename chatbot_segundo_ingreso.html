<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat · Segunda Ingreso en Playa</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--wa-green:#075E54;--wa-light:#DCF8C6;--wa-bg:#ECE5DD;--wa-white:#fff;--wa-gray:#f0f0f0;--wa-dark:#1a1a1a;--wa-text:#303030;--wa-sub:#667781;--gold:#c49a3c;--sans:'Nunito',system-ui,sans-serif;}
body{font-family:var(--sans);background:var(--wa-bg);min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}

/* HEADER */
.wa-header{background:var(--wa-green);padding:.875rem 1rem;display:flex;align-items:center;gap:.875rem;position:sticky;top:0;z-index:100;}
.wa-avatar{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.wa-info{flex:1;}
.wa-name{font-size:15px;font-weight:600;color:#fff;}
.wa-status{font-size:12px;color:rgba(255,255,255,.7);}
.wa-actions{display:flex;gap:1rem;}
.wa-actions span{font-size:20px;cursor:pointer;color:rgba(255,255,255,.8);}

/* CHAT */
.chat-body{flex:1;padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.5rem;padding-bottom:80px;}

.msg{max-width:80%;word-wrap:break-word;position:relative;}
.msg-bot{align-self:flex-start;}
.msg-user{align-self:flex-end;}
.msg-bubble{padding:.625rem .875rem;border-radius:8px;font-size:14px;line-height:1.5;position:relative;}
.msg-bot .msg-bubble{background:var(--wa-white);border-radius:0 8px 8px 8px;color:var(--wa-text);}
.msg-user .msg-bubble{background:var(--wa-light);border-radius:8px 0 8px 8px;color:var(--wa-text);}
.msg-time{font-size:10px;color:var(--wa-sub);margin-top:2px;text-align:right;}
.msg-bot .msg-time{text-align:left;}
.typing{display:flex;align-items:center;gap:4px;padding:.5rem .875rem;background:var(--wa-white);border-radius:0 8px 8px 8px;width:60px;}
.typing span{width:7px;height:7px;border-radius:50%;background:#aaa;animation:bounce .9s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* OPCIONES */
.options-wrap{display:flex;flex-direction:column;gap:.375rem;margin-top:.375rem;align-self:flex-start;max-width:90%;}
.opt-btn{background:var(--wa-white);border:1.5px solid #25D366;border-radius:20px;padding:.5rem 1rem;font-size:13px;color:#075E54;font-weight:600;cursor:pointer;font-family:var(--sans);text-align:left;transition:all .15s;}
.opt-btn:hover{background:#e8fdf1;}
.opt-btn:active{transform:scale(.97);}

/* INPUT */
.wa-input-wrap{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--wa-bg);padding:.75rem 1rem;display:flex;align-items:center;gap:.625rem;border-top:1px solid rgba(0,0,0,.1);}
.wa-input{flex:1;background:var(--wa-white);border:none;border-radius:25px;padding:.625rem 1rem;font-size:14px;font-family:var(--sans);outline:none;color:var(--wa-text);}
.wa-send{width:44px;height:44px;border-radius:50%;background:#25D366;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

/* DATE DIVIDER */
.date-divider{text-align:center;font-size:11px;color:var(--wa-sub);background:rgba(0,0,0,.08);padding:3px 10px;border-radius:10px;align-self:center;margin:.5rem 0;}
</style>
</head>
<body>

<div class="wa-header">
  <div class="wa-avatar">🏖</div>
  <div class="wa-info">
    <div class="wa-name">Segundo Ingreso · Playa</div>
    <div class="wa-status" id="status-txt">en línea</div>
  </div>
</div>

<div class="chat-body" id="chat"></div>

<div class="wa-input-wrap">
  <input class="wa-input" id="user-input" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')sendText()"/>
  <button class="wa-send" onclick="sendText()">➤</button>
</div>

// Respuesta por defecto
var defaultReply = '¡Buena pregunta! Para darte una respuesta precisa y personalizada, lo mejor es que hablemos en tu sesión de evaluación gratuita — 25 minutos, tienes mucho que ganar y poco que perder. ¿La agendamos? 😊';

// Función para encontrar respuesta
function findAnswer(input) {
  var lower = input.toLowerCase();
  for (var i = 0; i < QA.length; i++) {
    var keys = QA[i].k;
    for (var j = 0; j < keys.length; j++) {
      if (lower.includes(keys[j])) return QA[i].r;
    }
  }
  return null;
}

// Agregar mensaje
function addMsg(text, type, showOptions) {
  var t = new Date();
  var ts = t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  var div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.innerHTML = '<div class="msg-bubble">' + text.replace(/\n/g,'<br>') + '</div><div class="msg-time">' + ts + (type==='bot'?' ✓✓':'') + '</div>';
  chat.appendChild(div);
  if (showOptions) addOptions();
  chat.scrollTop = chat.scrollHeight;
}

function addOptions() {
  var opts = [
    '¿Cuánto cuesta?',
    '¿Dónde está?',
    '¿Cómo funciona el negocio?',
    '¿Cuántas noches necesito rentar?',
    '¿Quién construye?',
    '¿Cuándo me entregan?',
    'Quiero agendar mi sesión',
    'Hablar con un asesor',
  ];
  var wrap = document.createElement('div');
  wrap.className = 'options-wrap';
  opts.forEach(function(o) {
    var btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o;
    btn.onclick = function() {
      wrap.remove();
      addMsg(o, 'user');
      processInput(o);
    };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(cb) {
  var t = document.createElement('div');
  t.className = 'msg msg-bot';
  t.id = 'typing';
  t.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
  var delay = 800 + Math.random() * 700;
  setTimeout(function() {
    t.remove();
    cb();
  }, delay);
}

function processInput(input) {
  var lower = input.toLowerCase();
  // Detectar agenda/sesión
  if (lower.includes('agendar') || lower.includes('sesión') || lower.includes('sesion') || lower.includes('cita') || lower.includes('quiero evaluar')) {
    showTyping(function() {
      addMsg('¡Perfecto! 🎉 Para agendar tu sesión gratuita de 25–30 minutos, escríbenos directo por WhatsApp:\n\n👉 wa.me/527441752143\n\nUna asesora te confirmará fecha y hora en minutos. ¡Te esperamos!', 'bot', false);
    });
    return;
  }
  // Detectar hablar con persona
  if (lower.includes('hablar') || lower.includes('asesor') || lower.includes('humano') || lower.includes('persona') || lower.includes('karina')) {
    showTyping(function() {
      addMsg('¡Claro! Te conectamos de inmediato con una asesora:\n\n👉 wa.me/527441752143\n\nEscríbenos y en minutos alguien del equipo te atiende. 📲', 'bot', false);
    });
    return;
  }
  var answer = findAnswer(input);
  showTyping(function() {
    if (answer) {
      // Agregar invitación a sesión al final (50% de las veces)
      var suffix = '';
      if (Math.random() > 0.5 && !answer.includes('sesión') && !answer.includes('sesion') && !answer.includes('25 min')) {
        suffix = '\n\n¿Te agendamos una sesión de 25 min para verlo con tus números? 📊';
      }
      addMsg(answer + suffix, 'bot', false);
    } else {
      addMsg(defaultReply, 'bot', false);
    }
    // Mostrar opciones de vez en cuando
    if (Math.random() > 0.65) {
      setTimeout(addOptions, 300);
    }
  });
}

function sendText() {
  var input = document.getElementById('user-input');
  var val = input.value.trim();
  if (!val) return;
  input.value = '';
  addMsg(val, 'user');
  processInput(val);
}

// INICIO DEL CHAT
window.onload = function() {
  // Divider de fecha
  var d = document.createElement('div');
  d.className = 'date-divider';
  d.textContent = 'Hoy';
  chat.appendChild(d);

  // Mensaje de bienvenida
  setTimeout(function() {
    showTyping(function() {
      addMsg('¡Hola! 👋 Gracias por tu interés.', 'bot', false);
      setTimeout(function() {
        showTyping(function() {
          addMsg('Estás a un paso de conocer una idea de negocio que muchas familias en México están desarrollando con bienes raíces de playa en Acapulco. 🏖', 'bot', false);
          setTimeout(function() {
            showTyping(function() {
              addMsg('Puedo responderte preguntas ahora mismo — o si prefieres, en 25–30 minutos te mostramos todo en vivo con números reales. ¿Por dónde empezamos?', 'bot', true);
            });
          }, 600);
        });
      }, 500);
    });
  }, 800);
};
